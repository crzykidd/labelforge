name: labelforge

services:
  labelforge:
    build:
      context: .
      args:
        GIT_COMMIT: ${GIT_COMMIT:-}
    image: labelforge:latest
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    # Reverse proxy / tunnel wiring is deployment-specific. labelforge serves plain HTTP on port 8000;
    # put it behind whatever proxy you use (Traefik, Caddy, nginx, Cloudflare Tunnel, etc.).
    # To use a host directory instead of a named volume, replace with:  - /your/host/path:/data
    volumes:
      - labelforge-data:/data

volumes:
  labelforge-data:
